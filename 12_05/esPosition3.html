<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            
        }

        body {
            background-color: green;
        }


        .box_blu_sx {
            position: absolute;
            width: 300px;
            height: 300px;
            background-color: blue;
            top: 50px;
            left: 50px;

        }

        .box_blu_dx {
            position: absolute;
            width: 300px;
            height: 300px;
            background-color: blue;
            top: 50px;
            left: 370px;
        }

        
        .box_rosso {
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: red;
            top: 0;
            left: 0;
        }   


        .box_rosso1{
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: red;
            top: 35%;
            right: 0;
        }

        .box_rosso2 {
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: red;
            top: 35%;
            left: 45px;
        }



    </style>

</head>
<body>


    <div class="box_blu_sx">
        <div class="box_rosso"></div>
        <div class="box_rosso1"></div>
    </div>

    <div class="box_blu_dx">
        <div class="box_rosso"></div>
        <div class="box_rosso2"></div>
    </div>

    </div>




</body>
</html>
