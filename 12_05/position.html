<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 2200px;
        }

        .box {
            position: relative;
            width: 200px;
            height: 200px;
            background-color: yellow;
            border: 1px solid black;
        }

        .box1 {

            position: relative;
            width: 200px;
            height: 200px;
            background-color: red;
            border: 1px solid black;
        }

        
        .box2 {
            z-index: 100;
            position: absolute;
            width: 200px;
            height: 200px;
            background-color: blue;
            border: 1px solid black;
            top: 100px;
            right: 650px;
        }

        .box_fixed {
            position: fixed;
            width: 200px;
            height: 200px;
            background-color: coral;
            border: 1px solid black;
        }

        

    </style>

</head>
<body>


    <div class="box"></div>

    <div class="box1"></div>

    <div class="box2"></div>

    <div class="box_fixed"></div>


</body>
</html>
