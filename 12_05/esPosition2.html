<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            
        }

        body {
            background-color: rgb(28, 28, 61);
        }


        .box {
            position: absolute;
            width: 400px;
            height: 400px;
            background-color: white;
            right: 150px;
            top: 200px;

        }

        .box1 {
            z-index: 2;
            position: absolute;
            width: 390px;
            height: 390px;
            background-color: red;
            right: 155px;
            top: 205px;
        }

        
        .blue {
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: blue;
        }

        .b1 {
            left: 0;
        }

        .b2 {
            bottom: 0;
            left: 0;
        }

        .b3 {
            right: 0;
            bottom: 140px;
        }


        .cerchio {

            position: absolute;
            width: 400px;
            height: 400px;
            background-color: yellow;
            border-radius: 50%;
            text-align: center;
            color: red;

            left: 50px;
            top: 230px;

            text-align: center;
            line-height: 400px;
        }


        

    </style>

</head>
<body>


    <div class="box"></div>

    <div class="box1">
        <div class="blue b1"></div>
        <div class="blue b2"></div>
        <div class="blue b3"></div>
    </div>

    <div class="cerchio">
        <p>TEST</p>
    </div>



</body>
</html>
