<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esempi flexbox</title>

    <style>

        .container{
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 10px;
        }


        .box {
            background: lime;
            padding: 20px;
            text-align: center;
        }


    </style>

</head>
<body>


    <div class="container">
        
        <div class="box">A</div>
        <div class="box">B</div>
        <div class="box">C</div>
    </div>



    
</body>
</html>
