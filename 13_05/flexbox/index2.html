<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esempi flexbox</title>

    <style>

        .navbar {
            display: flex;
            background: lightgreen;
            width: 98%;
            height: 40px;
            align-items: center;
            padding: 10px;
            justify-content: space-between;
        }



        .links {
            display: flex;
            justify-content: space-between;
        }


        .links a {
            margin-left: 15px;
            text-decoration: none;
            color: white;
        }


    </style>

</head>
<body>


    <header class="navbar">


    <div>LOGO</div>


    <nav class="links">
        <a href="">Home</a>
        <a href="">Prodotti</a>
        <a href="">Contatti</a>
    </nav>

    </header>

    <div class="container">

        <div>Ciao</div>
    </div>
    
</body>
</html>
